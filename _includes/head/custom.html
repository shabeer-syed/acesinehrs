<!-- === CUSTOM DROPDOWN FIX FOR ACE DOMAINS === -->
<style>
  /* Dropdown Container */
  .custom-nav-dropdown {
    position: absolute;
    left: 50%;
    transform: translateX(-50%) translateY(10px); /* Centers it and pushes it down slightly */
    top: 100%;
    width: 260px;
    background-color: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 0.75rem;
    box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.1);
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 99999;
    padding: 0.5rem 0;
    display: flex;
    flex-direction: column;
  }
  
  /* Hover effect on the parent menu item triggers the dropdown */
  .masthead__menu-item:hover .custom-nav-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0); /* Slides up smoothly */
  }

  /* Style the links inside the dropdown */
  .custom-nav-dropdown a {
    padding: 0.75rem 1.25rem !important;
    font-size: 14px !important;
    color: #475569 !important;
    text-decoration: none !important;
    border-bottom: 1px solid #f1f5f9 !important;
    display: block !important;
    font-weight: 500 !important;
    font-family: 'Inter', sans-serif !important;
    text-align: left !important;
    transition: all 0.2s ease !important;
  }
  
  .custom-nav-dropdown a:hover {
    background-color: #f8fafc !important;
    color: #2563eb !important; /* Turns blue on hover */
    padding-left: 1.5rem !important; /* Slight indent animation */
  }

  .custom-nav-dropdown a:last-child {
    border-bottom: none !important;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // 1. Find the navigation link that contains "ACE domains"
    const menuLinks = document.querySelectorAll('.masthead__menu-item a');
    
    menuLinks.forEach(link => {
      if(link.textContent.includes("ACE domains")) {
        const parentLi = link.parentElement;
        parentLi.style.position = 'relative'; // Required to anchor the dropdown
        
        // 2. Create the beautiful dropdown HTML
        const dropdown = document.createElement('div');
        dropdown.className = 'custom-nav-dropdown';
        dropdown.innerHTML = `
          <a href="https://acesinehrs.com/indicators/">All indicators</a>
          <a href="https://acesinehrs.com/CM/">Child maltreatment (CM)</a>
          <a href="https://acesinehrs.com/IPV/">Intimate partner violence (IPV)</a>
          <a href="https://acesinehrs.com/HRPCM/">High-risk presentations (HRP-CM)</a>
          <a href="https://acesinehrs.com/MHPs/">Parental mental health (MHPs)</a>
          <a href="https://acesinehrs.com/SM/">Parental substance misuse (SM)</a>
          <a href="https://acesinehrs.com/AFE/">Adverse family environments (AFE)</a>
        `;
        
        // 3. Attach it to the menu item
        parentLi.appendChild(dropdown);
      }
    });
  });
</script>
<!-- === END CUSTOM DROPDOWN FIX === -->
