<!-- === BULLETPROOF CUSTOM DROPDOWN FIX === -->
<style>
  /* Global Dropdown Container (Applies to both dropdowns) */
  .bulletproof-dropdown {
    position: absolute;
    transform: translateX(-50%) translateY(10px);
    width: 280px;
    background-color: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 0.75rem;
    box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 8px 10px -6px rgba(15, 23, 42, 0.1);
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 999999;
    padding: 0.5rem 0;
    display: flex;
    flex-direction: column;
  }
  
  /* Active Class added by JavaScript */
  .bulletproof-dropdown.show-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
  }

  /* Style the links inside */
  .bulletproof-dropdown a {
    padding: 0.75rem 1.25rem !important;
    font-size: 14px !important;
    color: #475569 !important;
    text-decoration: none !important;
    border-bottom: 1px solid #f1f5f9 !important;
    display: block !important;
    font-weight: 500 !important;
    font-family: 'Inter', sans-serif !important;
    text-align: left !important;
    transition: all 0.2s ease !important;
    box-shadow: none !important;
  }
  
  .bulletproof-dropdown a:hover {
    background-color: #f8fafc !important;
    color: #2563eb !important;
    padding-left: 1.5rem !important; /* Premium slide effect */
  }

  .bulletproof-dropdown a:last-child {
    border-bottom: none !important;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    
    // 1. Create the ACE Domains Dropdown
    const dropdownAce = document.createElement('div');
    dropdownAce.id = 'global-ace-dropdown';
    dropdownAce.className = 'bulletproof-dropdown';
    dropdownAce.innerHTML = `
      <a href="https://acesinehrs.com/indicators/">All indicators</a>
      <a href="https://acesinehrs.com/CM/">Child maltreatment (CM)</a>
      <a href="https://acesinehrs.com/IPV/">Intimate partner violence (IPV)</a>
      <a href="https://acesinehrs.com/HRPCM/">High-risk presentations (HRP-CM)</a>
      <a href="https://acesinehrs.com/MHPs/">Parental mental health (MHPs)</a>
      <a href="https://acesinehrs.com/SM/">Parental substance misuse (SM)</a>
      <a href="https://acesinehrs.com/AFE/">Adverse family environments (AFE)</a>
      <a href="https://acesinehrs.com/CYP-MHPs/">CYP Mental health problems</a>
    `;
    document.body.appendChild(dropdownAce);

    // 2. Create the Browse Codes Dropdown
    const dropdownBrowse = document.createElement('div');
    dropdownBrowse.id = 'global-browse-dropdown';
    dropdownBrowse.className = 'bulletproof-dropdown';
    dropdownBrowse.innerHTML = `
      <a href="https://acesinehrs.com/codelistbrowse/">ACEs</a>
      <a href="https://acesinehrs.com/codelistbrowse-CYP-MHP/">CYP Mental health problems</a>
    `;
    document.body.appendChild(dropdownBrowse);

    let hoverTimeout;
    let activeDropdown = null; // Keeps track of which one is currently showing

    // Function to calculate exact position and show
    function showDropdown(triggerElement, targetDropdown) {
      clearTimeout(hoverTimeout);
      
      // Hide the other dropdown if it's currently open
      if (activeDropdown && activeDropdown !== targetDropdown) {
        activeDropdown.classList.remove('show-dropdown');
      }
      
      activeDropdown = targetDropdown;
      const rect = triggerElement.getBoundingClientRect();
      
      // Center it below the nav link
      targetDropdown.style.left = (rect.left + window.scrollX + (rect.width / 2)) + 'px';
      targetDropdown.style.top = (rect.bottom + window.scrollY + 10) + 'px'; 
      targetDropdown.classList.add('show-dropdown');
    }

    // Function to hide all dropdowns
    function hideDropdowns() {
      // Add a slight delay so the mouse can safely move from the link to the dropdown box
      hoverTimeout = setTimeout(() => {
        dropdownAce.classList.remove('show-dropdown');
        dropdownBrowse.classList.remove('show-dropdown');
        activeDropdown = null;
      }, 150); 
    }

    // Event Delegation: Listens to the whole body so it works even if the theme moves links around
    document.body.addEventListener('mouseover', function(e) {
      // Look for the specific text in the navigation links
      const isAceLink = e.target.tagName === 'A' && e.target.textContent.includes('ACE domains');
      const isBrowseLink = e.target.tagName === 'A' && e.target.textContent.includes('Browse codes');
      
      // Check if hovering inside the actual dropdown boxes
      const isInsideAce = e.target.closest('#global-ace-dropdown');
      const isInsideBrowse = e.target.closest('#global-browse-dropdown');

      if (isAceLink) {
        showDropdown(e.target, dropdownAce);
      } else if (isBrowseLink) {
        showDropdown(e.target, dropdownBrowse);
      } else if (isInsideAce || isInsideBrowse) {
        clearTimeout(hoverTimeout); // Keep it open if they are hovering the dropdown itself
      } else {
        hideDropdowns();
      }
    });

    // Make sure they close if the user moves off the dropdown boxes
    dropdownAce.addEventListener('mouseleave', hideDropdowns);
    dropdownBrowse.addEventListener('mouseleave', hideDropdowns);
  });
</script>
<!-- === END BULLETPROOF CUSTOM DROPDOWN === -->
